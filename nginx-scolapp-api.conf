# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name api.scolapp.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.scolapp.com;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/api.scolapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.scolapp.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Strong SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers (Nginx layer — belt and braces with FastAPI headers)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide Nginx version
    server_tokens off;

    # Request size limit (prevent huge payloads)
    client_max_body_size 64k;

    # Timeouts
    client_body_timeout   10s;
    client_header_timeout 10s;
    keepalive_timeout     30s;
    send_timeout          10s;

    # Block bad bots and scanners
    if ($http_user_agent ~* (masscan|nmap|nikto|sqlmap|zmeu|dirbuster)) {
        return 403;
    }

    # Only allow GET and POST
    if ($request_method !~ ^(GET|POST|OPTIONS)$) {
        return 405;
    }

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # Remove upstream server header
        proxy_hide_header  X-Powered-By;
        proxy_hide_header  Server;
    }
}