# /etc/nginx/sites-available/scolapp-api
# HTTP — redirects to HTTPS (active after certbot)
server {
    listen 80;
    server_name api.scolapp.com;

    # Certbot will fill this in automatically
    location / {
        return 301 https://$host$request_uri;
    }
}

